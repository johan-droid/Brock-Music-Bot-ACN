# alertmanager.yml
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'telegram_webhook'

receivers:
- name: 'telegram_webhook'
  telegram_configs:
  - bot_token: "TELEGRAM_BOT_TOKEN"
    chat_id: 123456789
    parse_mode: 'Markdown'
    message: |-
      {{ range .Alerts }}
      *Alert:* {{ .Labels.alertname }}
      *Severity:* {{ .Labels.severity }}
      *Status:* {{ .Status }}
      {{ end }}
