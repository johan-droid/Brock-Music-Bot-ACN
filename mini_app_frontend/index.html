<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soul King Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0b1220; color: #f5f7fb; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .app-shell { width: min(640px, calc(100% - 24px)); padding: 24px; border-radius: 18px; background: rgba(255,255,255,0.04); box-shadow: 0 18px 45px rgba(0,0,0,0.16); }
    h1 { margin-top: 0; }
    pre { background: rgba(255,255,255,0.08); padding: 16px; border-radius: 12px; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="app-shell">
    <h1>Soul King Mini App</h1>
    <p>This page is a Telegram Web App frontend sample.</p>
    <p>Development URL: <strong>http://localhost:8000/index.html</strong></p>
    <p>When deployed for Telegram, use a valid HTTPS URL.</p>
    <p>Example initData sent to backend:</p>
    <pre id="init-data">Loading...</pre>
  </div>

  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      const app = window.Telegram.WebApp;
      app.ready();
      document.getElementById('init-data').textContent = app.initData || '<no initData>';

      // Example: send initData to backend auth header
      // fetch('/api/v1/lobby', {
      //   method: 'GET',
      //   headers: {
      //     'X-Telegram-Init-Data': app.initData
      //   }
      // });
    } else {
      document.getElementById('init-data').textContent = 'Telegram Web App SDK not available. Open this page inside Telegram.';
    }
  </script>
</body>
</html>
